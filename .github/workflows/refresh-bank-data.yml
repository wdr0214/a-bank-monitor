name: Refresh bank data

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Trigger source"
        required: false
        default: "manual"

permissions:
  contents: write

concurrency:
  group: refresh-bank-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-actions.txt

      - name: Refresh data
        run: python scripts/update_bank_data.py

      - name: Commit latest data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/latest.csv data/status.json
          git diff --cached --quiet || git commit -m "Update bank monitor data"
          git pull --rebase origin main
          git push
